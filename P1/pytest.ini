[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --disable-warnings
    -p no:launch_testing
    -p no:launch_testing_ros
    -p no:launch_testing_ros_pytest_entrypoint
    -p no:ament_pep257
    -p no:ament_lint
    -p no:ament_xmllint
    -p no:ament_copyright
    -p no:ament_flake8